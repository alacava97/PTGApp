<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/auth.css">
  <link rel="stylesheet" href="styles/buttons.css">
  <link rel="stylesheet" href="styles/themes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <title>Reset Password</title>
</head>
<body>
  <div class="login-flex">
    <div class="login-window">
      <a href="/public/login.html" class="back-button">< back to login</a>
      <h1>Reset Password</h1><br>

      <div id="expired-message" style="display:none;">
        <h2>Link expired</h2>
        <p>This password reset link is invalid or has expired.</p>
        <a href="/public/password.html">Request a new reset link</a>
      </div>

      <form id="password-reset-form" style="display:none;">
        <label for="password">Password
          <input id="password" type="password" name="password" placeholder="Password" required />
        </label>

        <label for="confirm-password">Confirm Password
          <input id="confirm-password" type="password" name="confirmPassword" placeholder="Confirm Password" required />
        </label>
        <button type="submit" class="green" id="reset-btn">Reset Password</button>
      </form>
      <div id="message"></div>
      <div id="success-message" style="display:none;">
        <h2>Password updated!</h2>
        <p>
          Redirecting to login... 
          <a href="/public/login.html">Click here if not redirected</a>
        </p>
      </div>
    </div>
  </div>



  <script src="js/buttons.js"></script>
  <script>
    const resetBtn = new Button('reset-btn', resetPassword);
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm-password');
    const btn = document.getElementById('reset-btn');

    function checkMatch() {
      btn.disabled = passwordInput.value !== confirmInput.value;
    }

    passwordInput.addEventListener('input', checkMatch);
    confirmInput.addEventListener('input', checkMatch);

    document.addEventListener('DOMContentLoaded', async () => {
      const token = new URLSearchParams(window.location.search).get('token');

      const form = document.getElementById('password-reset-form');
      const expired = document.getElementById('expired-message');

      if (!token) {
        form.style.display = 'none';
        expired.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`/auth/validate-reset-token?token=${token}`);
        const data = await res.json();

        if (!data.valid) {
          form.style.display = 'none';
          expired.style.display = 'block';
        } else {
          form.style.display = 'flex';
          expired.style.display = 'none';
        }

      } catch (err) {
        form.style.display = 'none';
        expired.style.display = 'block';
      }
    });

    async function resetPassword(event) {
      event.preventDefault();

      const form = document.getElementById('password-reset-form');
      const formData = new FormData(form);
      const password = formData.get('password');
      const confirmPassword = formData.get('confirmPassword');

      if (password !== confirmPassword) {
        document.getElementById('message').textContent = "Passwords do not match.";
        return;
      }

      const token = new URLSearchParams(window.location.search).get('token');

      const data = {
        token,
        password
      };

      const res = await fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      document.getElementById('message').textContent = result.message || result.error || 'Unknown response';

      if (res.ok) {
        form.style.display = "none";

        const success = document.getElementById('success-message');
        success.style.display = "block";

        setTimeout(() => {
          window.location.href = "/public/login.html";
        }, 2500);
      }
    }
  </script>
</body>
</html>
