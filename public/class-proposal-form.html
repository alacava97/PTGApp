<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="styles/styles.css">
	<link rel="stylesheet" href="styles/buttons.css">
	<link rel="stylesheet" href="styles/themes.css">
	<link rel="stylesheet" href="styles/modals.css">
	<link rel="stylesheet" href="styles/class-props.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
	<title>Class Proposal</title>
</head>
<body>
	<header>
		<div class="title">
			<h1>Class Proposal Form</h1>
			<h2>2027 Piano Technicians' Guild Convention</h2>
		</div>
	</header>
	<div class="main-content">
		<form id="class-proposal" class="form-grid">
			<h2>Contact Information</h2>
			<label for="name">Name</label>
			<input id="name" type="text" name="name" autocomplete="name" required>
			<label for="email">Email</label>
			<input id="email" type="email" name="email" autocomplete="email" required>
			<label for="phone">Phone</label>
			<input id="phone" type="tel" name="phone" autocomplete="tel" required>
			<span>
				<label for="rpt">RPT</label>
				<input id="rpt" type="checkbox" name="rpt" value="true">
			</span>

			<div id="new-or-existing">
				<h2>Submit a new or existing class?</h2>
				<div style="display:flex; gap:10px;">
					<div id="new-class" class="button" style="background-color:#04AA6D;">New</div>
					<div id="old-class" class="button">Existing</div>
				</div>
					<label for="existing-classes" id="existing-class-label" style="display:none;">Select a class
					<select id="existing-classes" name="existing_class" style="display:block;width:100%;"></select>
				</label>
			</div>

			<h2>Class Information</h2>
			<label for="title">Class Title</label>
			<input id="title" type="text" name="title">
			<label for="desc">Description</label>
			<textarea id="desc" name="description"></textarea>
			<label for="level">Level</label>
			<select id="level" name="level">
				<option value="" disabled selected>Select a level</option>
			</select>
			<div id="level-widget"></div>
			<label for="type">Type</label>
			<select id="type" name="type">
				<option value="" disabled selected>Select a type</option>
			</select>
			<label for="length">Class Length<br>(1 period = 1.5 hours)</label>
			<input id="length" name="length" type="number" min="1" max="4">
			<label for="uprights">Uprights needed</label>
			<input id="uprights" name="uprights" type="number" min="0">
			<label for="grands">Grands needed</label>
			<input id="grands" name="grands" type="number" min="0">
			<label for="sponsor">Sponsor</label>
			<input id="sponsor" type="text" name="sponsor_name">

			<button type="submit" style="margin-top: 20px;height: 30px;background-color: #04AA6D;border-radius: 5px;box-shadow:0px 3px 5px black">Submit</button>
			<span id="message"></span>
		</form>
	</div>
</body>
<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
	document.addEventListener('DOMContentLoaded', async () => {
		const res = await fetch('/auth/session', { credentials: 'include' });
		const user = await res.json();

		try{
			const response = await fetch(`/api/public/getTypes`);
			if(!response.ok) throw new Error(`Failed to fetch types`);
			const types = await response.json();

			const levelRes = await fetch(`/api/public/getLevels`);
			if (!levelRes.ok) throw new Error(`Failed to fetch levels`);
			const levels = await levelRes.json();

			Object.entries(types)
				.sort(([, a], [, b]) =>
					a['type'].localeCompare(b['type'], undefined, {sensitivity: 'base'})
				)
				.forEach(row => {
					row = row[1]
					if (row.type == "Fundraiser" || row.type == "No Type" || row.type == "Regional") {
						return;
					}
					const option = document.createElement('option');
					option.value = row.id;
					option.textContent = row['type'];
					document.getElementById('type').appendChild(option);
				});

			Object.entries(levels).forEach(row => {
				row = row[1];
				const option = document.createElement('option');
				option.value = row.id;
				option.textContent = row.level;
				document.getElementById('level').appendChild(option);
			});
		} catch (err) {
			console.error(`Failed to load types:`, err);
		}

		const form = document.getElementById('class-proposal');
		form.addEventListener('submit', (e) => {
			handleFormSubmission(e, form, `/api/public/createClassProposals`, 'POST', () => {
				document.getElementById('message').textContent = "Thank you for your submission. The institute team will review your class and get back to you soon!"
			});
		});

		const data = await getData()
		if (data) {
			await getInstructorInfo(data.instructor);
			populateClassSelect(data.classes);
		}
		classType();

		if (user.role == 'admin') {
			await editLevelWidget(document.getElementById('level-widget'));
		}
	});

	async function getData() {
		try {
			const token = new URLSearchParams(window.location.search).get('token');
			if (!token) {
				document.getElementById('new-or-existing').style.display = "none";
				return;
			}
			const response = await fetch(`/api/public/getPropInfo/${token}`);
			if (!response.ok) throw new Error('Failed to fetch data');
			const data = await response.json();
			return data;
		} catch (err) {
			console.error('Error loading data:', err);
			return;
		}
	}

	async function getInstructorInfo(data) {
		Object.keys(data).forEach(key => {
			const inputEl = document.querySelector(`[name="${key}"]`);
			if(inputEl && inputEl.type == 'checkbox') {
				inputEl.checked = data[key];
			} else if (inputEl) {
				inputEl.value = data[key];
			}
		})
	}

	function classType() {
		const newBtn = document.getElementById('new-class');
		const oldBtn = document.getElementById('old-class');

		const newForm = document.getElementById('existing-class-label');

		oldBtn.addEventListener('click', () => {
			newForm.style.display = "block";
			oldBtn.style.backgroundColor = "#04AA6D"
			newBtn.style.backgroundColor = "";
		});

		newBtn.addEventListener('click', () => {
			newForm.style.display = "none";
			oldBtn.style.backgroundColor = "";
			newBtn.style.backgroundColor = "#04AA6D";
		})
	}

	function populateClassSelect(data) {
		const select = document.getElementById('existing-classes');

		const defaultOpt = document.createElement('option');
		defaultOpt.value = "";
		defaultOpt.textContent = "--Select an Option--";
		select.appendChild(defaultOpt);

		data.forEach(entry => {
			const option = document.createElement('option');
			option.value = entry.class_id;
			option.textContent = entry.title;
			select.appendChild(option);
		});

		select.addEventListener('change', () => {
			const classId = select.value;
			const selectedClass = data.find(c => c.class_id == classId);
			Object.keys(selectedClass).forEach(key => {
				const inputEl = document.querySelector(`[name="${key}"]`);
				if(inputEl) {
					inputEl.value = selectedClass[key];
				}
			})
		})
	}

	async function editLevelWidget(el) {
		const widget = document.createElement('div');
		widget.classList.add('widget');

		const editBtn = document.createElement('div');
		editBtn.textContent = 'edit';
		editBtn.classList.add('widget-btn');
		widget.appendChild(editBtn);

		const cont = await renderLevelList();
		widget.appendChild(cont);

		document.addEventListener('click', function(e) {
			if (!widget.contains(e.target)) {
				cont.style.display = 'none';
				editBtn.style.display = 'flex';
			}
		})

		editBtn.addEventListener('click', (e) => {
			cont.style.display = 'flex';
			editBtn.style.display = 'none';
		});

		el.appendChild(widget);
	}

	async function renderLevelList() {
		const levelEditContainer = document.createElement('div');
		levelEditContainer.classList.add('widget-options');
		levelEditContainer.style.display = 'none';

		const res = await fetch(`/api/getLevels`);
		const levels = await res.json();
		levels.forEach(row => {
			const levelContainer = document.createElement('div');
			levelContainer.classList.add('edit-el');

			const levelEl = document.createElement('div');
			levelEl.textContent = row.level;
			levelContainer.appendChild(levelEl);

			const radio = document.createElement('input');
			radio.type = 'checkbox';
			radio.checked = row.include;
			radio.id = row.id;
			levelContainer.appendChild(radio);

			levelEditContainer.appendChild(levelContainer);
		});

		return levelEditContainer;
	}
</script>
