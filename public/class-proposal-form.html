<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="styles/styles.css">
	<link rel="stylesheet" href="styles/buttons.css">
	<link rel="stylesheet" href="styles/themes.css">
	<link rel="stylesheet" href="styles/modals.css">
	<link rel="stylesheet" href="styles/class-props.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
	<title>Class Proposal</title>
	<style>
		.oops {
			margin: 20px auto;
			max-width: 500px;
		}

		.oops a {
			display: inline-block;
			text-decoration: underline;
			color: blue;
		}
	</style>
</head>
<body>
	<header>
		<div class="title">
			<h1>Class Proposal Form</h1>
			<h2 id="yearh2">2027 Piano Technicians Guild Convention</h2>
		</div>
	</header>
	<div class="main-content">
		<form id="class-proposal" class="form-grid">
			<h2>Contact Information</h2>
			<label for="fname">First Name
				<input id="fname" type="text" name="fname" required>
			</label>

			<label for="lname">Last Name
				<input id="lname" type="text" name="lname">
			</label>

			<label for="email">Email
				<input id="email" type="email" name="email" autocomplete="email" required>
			</label>

			<label for="phone">Phone
				<input id="phone" type="tel" name="phone" autocomplete="tel" required>
			</label>

			<span>
				<label for="rpt">RPT
					<input id="rpt" type="checkbox" name="rpt" value="true">
				</label>	
			</span>

			<label for="additional-instructors">Additional Instructors
				<textarea id="additional-instructors" name="additional_instructors" style="field-sizing:content;min-height:65px;" placeholder="If there are additional instructors, list them here"></textarea>
			</label>

			<div id="new-or-existing">
				<h2>Submit a new or existing class?</h2>
				<div style="display:flex; gap:10px;">
					<div id="new-class" class="button" style="background-color:#04AA6D;">New</div>
					<div id="old-class" class="button">Existing</div>
				</div>
					<label for="existing-classes" id="existing-class-label" style="display:none;">Select a class
					<select id="existing-classes" name="existing_class" style="display:block;width:100%;"></select>
				</label>
			</div>

			<h2>Class Information</h2>
			<label for="title">Class Title
				<input id="title" type="text" name="title">
			</label>

			<label for="desc">Description
				<textarea id="desc" name="description"></textarea>
			</label>

			<label for="level">Level
				<select id="level" name="level">
					<option value="" disabled selected>Select a level</option>
				</select>
			</label>

			<div id="level-widget"></div>

			<label for="type">Category
				<select id="type" name="type">
					<option value="" disabled selected>Select a category</option>
				</select>
			</label>

			<label for="length">Class Length
				<div class="subtitle">How many periods per class session? (1 period = 1.5 hours)</div>
				<select id="length" name="length">
					<option value="1">1 Period</option>
					<option value="2">2 Periods</option>
					<option value="4">4 Periods (all day)</option>
				</select>
			</label>

			<label for="uprights">Uprights needed
				<input id="uprights" name="uprights" type="number" min="0">
			</label>

			<label for="grands">Grands needed
				<input id="grands" name="grands" type="number" min="0">
			</label>

			<label for="sponsor">Sponsor
				<div class="subtitle">Are you being paid by a third party to teach this class?</div>
				<input id="sponsor" type="text" name="sponsor_name">
			</label>
			
			<button type="submit" style="margin-top: 20px;height: 30px;background-color: #04AA6D;border-radius: 5px;box-shadow:0px 3px 5px black">Submit</button>
			<span id="message"></span>
		</form>
	</div>
</body>
<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
	document.addEventListener('DOMContentLoaded', async () => {
		const params = new URLSearchParams(window.location.search);

		const id = params.get('id');
		const token = params.get('token');

		const data = await DataAPI.load();
		const convention = data.conventions.find(c => c.id == id);

		const baseUrl = `/public/class-proposal-form.html?id=${encodeURIComponent(data?.conventions?.[0]?.id || '')}`;

		const redirectUrl = token
		  	? `${baseUrl}&token=${encodeURIComponent(token)}`
		  	: baseUrl;

		const yearh2 = document.getElementById('yearh2');
		const mc = document.querySelector('.main-content');
		
		let closed = false;

		if (!id || !convention) {
			renderError();
			return;
		}

		if (convention.props_closed) {
		  	const propsClosed = new Date(convention.props_closed);

		  	if (!isNaN(propsClosed.getTime())) {
			    closed = propsClosed < new Date();
		  	}
		}

		if (convention.closed === true || closed === true) {
		  	renderError();
		  	return;
		}


		function renderError() {
		  	yearh2.innerHTML = `Something went wrong`;

		  	mc.classList.add('oops');
		  	mc.innerHTML = `
		    	<p>
		      		Looks like this convention isn't accepting class proposals or doesn't exist.
		      		<a href="${redirectUrl}">
		        	click here
		      		</a>
		      		to be redirected to the most recent class proposal form.
		    	</p>
		    	<p>Please contact <a href="mailto:institute@ptg.org">institute@ptg.org</a> if you are having a problem.</p>
		  	`;
		}

		const res = await fetch('/auth/session', { credentials: 'include' });
		const user = await res.json();

		const year = convention.year;
		const startDate = new Date(convention.start_date)
		const sD = startDate.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit'});
		const endDate = new Date(convention.end_date)
		const eD = endDate.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit'});
		yearh2.innerHTML = `${year} Piano Technicians Guild Convention<br>${convention.city_state} ${sD} - ${eD}`

		populateLevelSelect(data.levels);
		populateTypeSelect(data.types);

		const form = document.getElementById('class-proposal');
		form.addEventListener('submit', async (e) => {
			e.preventDefault();
			const formData = parseForm(form);
			formData.year = year;
			const message = document.getElementById('message');

			if (formData.lname) {
				formData.name = formData.fname + " " + formData.lname;
			} else {
				formData.name = formData.fname;
			}
			
			try {
				const res = await fetch(`/api/public/createClassProposals`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(formData)
				});

				const result = await res.json();
				if (message) {
					message.textContent = result.message || result.error || 'Unknown response';
				}

				if (res.ok) {
					const level = formData.level ? data.levels.find(level => level.id == formData.level).level : '' ;
					const type = formData.type ? data.types.find(type => type.id == formData.type).type : '' ;

					const forEmail = {
						Name: formData.name,
						Email: formData.email,
						Phone: formData.phone,
						RPT: formData.rpt,
						Class_Title: formData.title,
						Class_Description: formData.description,
						Level: level,
						Type: type,
						Periods: formData.length,
						Uprights: formData.uprights,
						Grands: formData.grands,
						Sponsor: formData.sponsor
					};

					const email = await fetch('/api/email/class-prop-confirmation', {
						method: 'POST',
						headers: {
							"Content-Type": 'application/json',
						},
						body: JSON.stringify({
							name: formData.fname,
							email: formData.email,
							formData: forEmail,
							convention: convention
						}),
					});

					if (token) {
						const params = new URLSearchParams();
						params.append('token', token);
						window.location.href = `/public/class-proposal-confirmation.html?id=${id}&year=${year}` + params.toString();
					} else {
						window.location.href = `/public/class-proposal-confirmation.html?id=${id}&year=${year}`;
					}
				}
			} catch (err) {
				console.error('Form submission failed:', err);
				message.textContent = 'Network error or server issue';
			}
		});

		//------For Existing Classes------//

		const instData = await getData(token)
		if (instData) {
			await getInstructorInfo(instData.instructor);
			populateClassSelect(instData.classes);
		}
		classType();

		//-----Include editing options if user is an admin-----//

		if (user.role == 'admin') {
			await editLevelWidget(document.getElementById('level-widget'));
		}
	});

	const DataAPI = {
		load: async () => {
			const [levels, types, conventions] = await Promise.all([
				fetchJSON(`/api/public/getLevels`),
				fetchJSON(`/api/public/getTypes`),
				fetchJSON(`/api/public/getConventions`)
			]);
			return { levels, types, conventions};
		}
	}

	async function populateLevelSelect(levels) {
		const levelSelect = document.getElementById('level');
		levelSelect.innerHTML = `<option value="" disabled selected>Select a level</option>`;

		Object.entries(levels).forEach(row => {
			row = row[1];
			const option = document.createElement('option');
			option.value = row.id;
			option.textContent = row.level;
			levelSelect.appendChild(option);
		});

	}

	async function populateTypeSelect(types) {
		Object.entries(types)
			.sort(([, a], [, b]) =>
				a['type'].localeCompare(b['type'], undefined, {sensitivity: 'base'})
			)
			.forEach(row => {
				row = row[1]
				if (row.type == "Fundraiser" || row.type == "No Type" || row.type == "Regional") {
					return;
				}
				const option = document.createElement('option');
				option.value = row.id;
				option.textContent = row['type'];
				document.getElementById('type').appendChild(option);
			});
	}

	async function getData(token) {
		try {
			if (!token) {
				document.getElementById('new-or-existing').style.display = "none";
				return;
			}
			const response = await fetch(`/api/public/getPropInfo/${token}`);
			if (!response.ok) throw new Error('Failed to fetch data');
			const data = await response.json();
			return data;
		} catch (err) {
			console.error('Error loading data:', err);
			return;
		}
	}

	async function getInstructorInfo(data) {
		Object.keys(data).forEach(key => {
			const inputEl = document.querySelector(`[name="${key}"]`);
			if(inputEl && inputEl.type == 'checkbox') {
				inputEl.checked = data[key];
			} else if (inputEl) {
				inputEl.value = data[key];
			}
		})
	}

	function classType() {
		const newBtn = document.getElementById('new-class');
		const oldBtn = document.getElementById('old-class');

		const newForm = document.getElementById('existing-class-label');

		oldBtn.addEventListener('click', () => {
			newForm.style.display = "block";
			oldBtn.style.backgroundColor = "#04AA6D"
			newBtn.style.backgroundColor = "";
		});

		newBtn.addEventListener('click', () => {
			newForm.style.display = "none";
			oldBtn.style.backgroundColor = "";
			newBtn.style.backgroundColor = "#04AA6D";
		})
	}

	function populateClassSelect(data) {
		const select = document.getElementById('existing-classes');

		const defaultOpt = document.createElement('option');
		defaultOpt.value = "";
		defaultOpt.textContent = "--Select an Option--";
		select.appendChild(defaultOpt);

		data.forEach(entry => {
			const option = document.createElement('option');
			option.value = entry.class_id;
			option.textContent = entry.title;
			select.appendChild(option);
		});

		select.addEventListener('change', () => {
			const classId = select.value;
			const selectedClass = data.find(c => c.class_id == classId);
			Object.keys(selectedClass).forEach(key => {
				const inputEl = document.querySelector(`[name="${key}"]`);
				if(inputEl) {
					inputEl.value = selectedClass[key];
				}
			})
		})
	}

	//-----EDIT SELECT-----//

	async function editLevelWidget(el) {
		const widget = document.createElement('div');
		widget.classList.add('widget');

		const editBtn = document.createElement('div');
		editBtn.textContent = 'edit';
		editBtn.classList.add('widget-btn');
		widget.appendChild(editBtn);

		const cont = await renderLevelList();
		widget.appendChild(cont);

		document.addEventListener('click', function(e) {
			if (!widget.contains(e.target)) {
				cont.style.display = 'none';
				editBtn.style.display = 'flex';
			}
		})

		editBtn.addEventListener('click', (e) => {
			cont.style.display = 'flex';
			editBtn.style.display = 'none';
		});

		el.appendChild(widget);
	}

	async function renderLevelList() {
		const levelEditContainer = document.createElement('div');
		levelEditContainer.classList.add('widget-options');
		levelEditContainer.style.display = 'none';

		const res = await fetch(`/api/getLevels`);
		const levels = await res.json();
		levels.forEach(row => {
			const levelContainer = document.createElement('div');
			levelContainer.classList.add('edit-el');

			const levelEl = document.createElement('div');
			levelEl.textContent = row.level;
			levelContainer.appendChild(levelEl);

			const radio = document.createElement('input');
			radio.type = 'checkbox';
			radio.checked = row.include;
			radio.id = row.id;
			radio.addEventListener('change', updateLevels)
			levelContainer.appendChild(radio);

			levelEditContainer.appendChild(levelContainer);
		});

		return levelEditContainer;
	}

	async function updateLevels(e) {
		const levelId = e.target.id;
		const value = e.target.checked;

		const res = await fetch(`/api/update/levels/${levelId}`, {
			method: 'PATCH',
			headers: {'Content-Type': 'application/json'},
			body: JSON.stringify({ include: value })
		});

		if (!res.ok) throw new Error(`Could not update level: ${res.status}`);

		const { levels } = await DataAPI.load();

		populateLevelSelect(levels);
	}
</script>
