<html>
<head>
	<meta charset="utf-8">

</head>
<body style="background-color: #eeeeee">
	
	<div id="paper">

	</div>
</body>
<script src="public/js/script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="public/js/qr.js"></script>

<script>
	document.addEventListener('DOMContentLoaded', async () => {
		
	});

	function generateQRCode(url, container) {
	    return new Promise(resolve => {
	        new QRCode(container, {
	            text: url,
	            width: 128,
	            height: 128,
	            colorDark: "#000000",
	            colorLight: "#ffffff",
	            correctLevel: QRCode.CorrectLevel.H
	        });

	        const checkCanvas = setInterval(() => {
	            const canvas = container.querySelector('canvas');
	            if (canvas) {
	                clearInterval(checkCanvas);
	                resolve(canvas.toDataURL('image/png'));
	            }
	        }, 10);
	    });
	}

	async function downloadQRCode(url, container) {
	    const dataUrl = await generateQRCode(url, container);

	    const link = document.createElement('a');
	    link.href = dataUrl;
	    link.download = 'qrcode.png';
	    link.click();
	}

	generateQRCode("https://myptginstitute.com/public/class-proposal-form.html", document.getElementById("paper"))

	
</script>
</html>
