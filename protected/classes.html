<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="public/styles/styles.css">
	<link rel="stylesheet" href="public/styles/buttons.css">
	<link rel="stylesheet" href="public/styles/themes.css">
	<link rel="stylesheet" href="public/styles/modals.css">
	<link rel="stylesheet" href="public/styles/nav-styles.css">
	<link rel="stylesheet" href="public/styles/row.css">
	<link rel="stylesheet" href="public/styles/sort-list.css">	
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
	<title>Classes</title>
</head>
<body>
	<header>
		<h1>Classes</h1>
		<div id="navbar"></div>
	</header>
	<div class="option-bar">
		<input id="searchbar" class="searchbar" type="text" name="searchbar" placeholder="Search by title, level, type, instructor, etc.">
		<div id="new-btn" class="new-btn">new</div>
	</div>
	<div id="count" class="count"></div>

	<div id="list"></div>
</body>
<script src="public/js/script.js"></script>
<script src="public/js/modals.js"></script>
<script src="public/js/UI.js"></script>
<script src="public/js/sort-list.js"></script>
<script>
	document.addEventListener('DOMContentLoaded', async () => {
		//populate table with class records
		const data = await DataAPI.load();
		displayRecords(data);

		//initialize searchbar
		searchBar(data);

		const newClass = new Modal('newModal');
		newClass.content(`<h2>New Class</h2>
			<form id="new-class-form">
				<label for="title">Title</label>
				<input id="title" type="text" name="title" placeholder="Class Title" autocomplete="off" required>
				<div class="seperator"></div>
				<label for="instDropdown">Instructor<br>(Type to search, ctrl + click to select multiple)</label>
				<select id="instDropdown" class="bigdd" name="instructor_ids" required multiple>
					<option value="" selected disabled>Select an instructor</option>
				</select>
				<div class="seperator"></div>
				<label for="length">Length</label>
				<input id="length" type="number" min="1" max="5" name="length" required>
				<div class="seperator"></div>
				<label for="typeDropdown">Type</label>
				<Select id="typeDropdown" name="type" required>
					<option value="" selected disabled>Select a type</option>
				</Select>
				<div class="seperator"></div>
				<label for="level">Level</label>
				<select id="level" name="level" required>
					<option value="" selected disabled>Select a level</option>
					<option value="introductory">Introductory</option>
					<option value="foundational">Foundational</option>
					<option value="beginner">Beginner</option>
					<option value="intermediate">Intermediate</option>
					<option value="advanced">Advanced</option>
					<option value="everyone">Everyone</option>
				</select>
				<div class="seperator"></div>
				<button type="submit" class="button">Create Record</button>
			</form>

			<div id="message"></div>`);
		document.getElementById('new-btn').addEventListener('click', () => newClass.show());
		async function classSuccess() {
			const updated = await read('classes');
			displayRecords(updated);
		}

		newClass.formSubmit(classSuccess, 'classes', type = 'create');

		//populate modal dropdowns
		const instDropdown = document.getElementById('instDropdown');
		populateDropdown(instDropdown, 'instructors', 'name');

		const typeDD = document.getElementById('typeDropdown');
		populateDropdown(typeDD, 'types', 'type');
	});

	const DataAPI = {
		load: async () => {
			const [ classList, instructorList ] = await Promise.all([
				fetchJSON(`/api/classes/getClassList`),
				fetchJSON(`/api/classes/getInstructorList`)
			]);

			return { classList, instructorList };
		}
	}

	function displayRecords(data) {
		const list = document.getElementById('list');
		list.innerHTML = '';

		Object.entries(data.classList).forEach(record => {
			const entry = new Row();

			const name = `${record[1].title}`
			const subtitle = record[1].instructors.map(i => i = i.name).join(', ');

			entry.addTitle(name);
			entry.addSubtitle(subtitle);
			//entry.addArrow(`/class-info.html?id=${record.id}`);
			
			entry.addDDMenu();
			renderDDInfo(record[1], data.instructorList).forEach(el => entry.dd.appendChild(el))

			list.appendChild(entry.row);
		});
		const count = document.getElementById('count');
		const num = data.classList.length;
		count.innerHTML = `Found ${num} records.`;
	};

	function renderDDInfo(record, allInstructors) {
		const instructors = renderInstructorList(record, allInstructors);

		const description = renderClassDescription(record.description);

		const details = renderClassDetails({ 
			length: record.length,
			type: record.type,
			level: record.level
		});

		const setup = renderClassSetup({
			conflicts: record.conflicts || '',
			preferences: record.preferences || '',
			requirements: record.requirements || '',
			prep_time: record.prep_time || '',
			seating: record.seating || 'either',
			extra_tables: record.extra_tables || '',
			aV_needs: record.extra_tables || '',
			special_equipment: record.special_equipment || ''
		});

		const pianos = renderClassPianos({
			piano: record.piano || 0,
			piano1: {
				type: record.piano_1_type || '',
				quality: record.piano_1_quality || '',
				size: record.piano_1_size || '',
				supplier: record.piano_1_supplier || '',
				manufacturer: record.piano_1_manufacturer || '',
				share: record.piano_1_share || 'false',
				requirements: record.piano_1_requirements || ''
			},
			piano2: {
				type: record.piano_2_type || '',
				quality: record.piano_2_quality || '',
				size: record.piano_2_size || '',
				supplier: record.piano_2_supplier || '',
				manufacturer: record.piano_2_manufacturer || '',
				share: record.piano_2_share || 'false',
				requirements: record.piano_2_requirements || ''
			}
		});

		return [instructors, description, details, setup, pianos];
	}

	function renderInstructorList(record, allInstructors) {
		const instructorList = new List(record, deleteInstructorFromClass);
		instructorList.addTitle('Instructors');
		instructorList.renderList(
			record.instructors,
			'name',
			deleteInstructorFromClass
		);

		instructorList.createAddButton(addInstructorToClass, allInstructors, 'name', searchable = true);
		
		return instructorList.listContainer;
	}

	function renderClassDescription(description) {
		const descriptionContainer = document.createElement('div');

		const descriptionEl = new Row();
		descriptionEl.addTitle('Class Description');
		descriptionEl.addSubtitle(description || 'No description');

		descriptionContainer.append(descriptionEl.row);

		return descriptionContainer
	}

	function renderClassDetails(record) {
		const detailContainer = document.createElement('div');

		const classLength = record.length ?
			`${record.length} ${record.length === 1 ?
				'period' :
				'periods'}` :
			'No length';

		const classDetails = new Row();
		classDetails.addTitle('Details');
		classDetails.addSubtitle(`Length: ${classLength}`);
		classDetails.addSeparator();
		classDetails.addSubtitle(`Type: ${record.type || 'No type'}`);
		classDetails.addSeparator();
		classDetails.addSubtitle(`Level: ${record.level?record.level.charAt(0).toUpperCase() + record.level.slice(1):'No level'}`);
		classDetails.addSeparator();

		detailContainer.appendChild(classDetails.row);

		return detailContainer
	}

	function renderClassSetup(record) {
		const setupContainer = document.createElement('div');

		const classSetup = new Row();
		classSetup.addTitle('Class Setup');
		classSetup.addSubtitle(`Conflicts: ${record.conflicts}`);
		classSetup.addSeparator();
		classSetup.addSubtitle(`Preferences: ${record.preferences}`);
		classSetup.addSeparator();
		classSetup.addSubtitle(`Requirements: ${record.class_requirements}`);
		classSetup.addSeparator();
		classSetup.addSubtitle(`Prep Time: ${record.prep_time}`);
		classSetup.addSeparator();
		classSetup.addSubtitle(`Seating: ${record.seating}`);
		classSetup.addSeparator();
		classSetup.addSubtitle(`Extra Tables: ${record.extra_tables}`);
		classSetup.addSeparator();
		classSetup.addSubtitle(`AV Needs: ${record.av}`);
		classSetup.addSeparator();
		classSetup.addSubtitle(`Special Equipment: ${record.special_equipment}`);

		setupContainer.appendChild(classSetup.row);

		return setupContainer
	}

	function renderClassPianos(data) {
		const pianoContainer = document.createElement('div');

		const row = new Row();
		row.addTitle('Piano Needs');

		if (data.piano == 0) {
			row.addSubtitle('No Pianos Needed');
			pianoContainer.appendChild(row.row);
		} else if (data.piano >= 1) {
			const piano1Row = new Row();
			piano1Row.addTitle('Piano 1');
			piano1Row.addSubtitle(`Type: ${data.piano1.type}`);
			piano1Row.addSeparator();
			piano1Row.addSubtitle(`Quality: ${data.piano1.quality}`);
			piano1Row.addSeparator();
			piano1Row.addSubtitle(`Size: ${data.piano1.size}`);
			piano1Row.addSeparator();
			piano1Row.addSubtitle(`Supplier: ${data.piano1.supplier}`);
			piano1Row.addSeparator();
			piano1Row.addSubtitle(`Manufacturer: ${data.piano1.manufacturer}`);
			piano1Row.addSeparator();
			piano1Row.addSubtitle(`Shared: ${data.piano1.share}`);
			piano1Row.addSeparator();
			piano1Row.addSubtitle(`Requirements: ${data.piano1.requirements}`);

			pianoContainer.append(row.row, piano1Row.row);
		}

		if (data.piano >= 2) {
			const piano2Row = new Row();
			piano2Row.addTitle('Piano 2');
			piano2Row.addSubtitle(`Type: ${data.piano2.type}`);
			piano2Row.addSeparator();
			piano2Row.addSubtitle(`Quality: ${data.piano2.quality}`);
			piano2Row.addSeparator();
			piano2Row.addSubtitle(`Size: ${data.piano2.size}`);
			piano2Row.addSeparator();
			piano2Row.addSubtitle(`Supplier: ${data.piano2.supplier}`);
			piano2Row.addSeparator();
			piano2Row.addSubtitle(`Manufacturer: ${data.piano2.manufacturer}`);
			piano2Row.addSeparator();
			piano2Row.addSubtitle(`Shared: ${data.piano2.share}`);
			piano2Row.addSeparator();
			piano2Row.addSubtitle(`Requirements: ${data.piano2.requirements}`);

			pianoContainer.appendChild(piano2Row.row);
		}
		
		return pianoContainer;
	}

	async function addInstructorToClass(instructorId, classId) {
		try {
			const result = await linkInstructorToClass({ instructor_id: instructorId, class_id: classId });
			console.log(result);
		} catch (err) {
			console.error(err);
		}
	}

	async function deleteInstructorFromClass(instructor, record) {
		if(!confirm(`Remove this ${instructor.name} from ${record.title}?`)) return;

		try {
			const result = await deleteClassInstructorLink(record.id, instructor.id);

			console.log(result);
		} catch (err) {
			console.error(err)
		}
	}
</script>
</html>
