<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="public/styles/nav-styles.css">
	<link rel="stylesheet" href="public/styles/themes.css">
	<link rel="stylesheet" href="public/styles/styles.css">
	<link rel="stylesheet" href="public/styles/dd-row.css">
	<link rel="stylesheet" href="public/styles/row.css">
	<link rel="stylesheet" href="public/styles/sort-list.css">
	<link rel="stylesheet" href="public/styles/admin.css">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
	<title>Admin Portal</title>
</head>
<style>
	.editable:hover {
		text-decoration: underline;
		cursor: pointer;
	}
</style>
<body>
	<header class="clearfix">
		<h1>Admin Tools</h1>
		<div id="navbar"></div>
	</header>
	<div id="list"></div>
</body>
<script src="public/js/script.js"></script>
<script src="public/js/UI.js"></script>
<script>
	const DOM = {
		main: document.getElementById('list')
	}

	document.addEventListener('DOMContentLoaded', async () => {
		try {
			const res = await fetch('/auth/session', { credentials: 'include' });

			const user = await res.json();
			if (!user.special_permission) {
				window.location.replace('/public/oops.html');
			}

			const { instTeam, users, activeCons, emails } = await DataAPI.load();
			renderInstTeam(instTeam);
			renderUserList(users);
			renderEmailFunctions(activeCons, emails);
		} catch (err) {
			console.error(err);
		}
	});

	const DataAPI = {
		load: async () => {
			const [ instTeam, users, activeCons, emails ] = await Promise.all([
				fetchJSON(`/admin/api/getInstitute`),
				fetchJSON(`/admin/api/getUsers`),
				fetchJSON(`/api/getActiveConventions`),
				fetchJSON(`/admin/api/getEmailingRules`),
			]);

			return { instTeam, users, activeCons, emails };
		}
	}

	function renderInstTeam(data) {
		const teamRow = new Row();
		teamRow.addTitle('Institute Team Members');
		teamRow.addDDMenu();

		const table = document.createElement('table');
		const tr = document.createElement('tr');

		const headers = ['Institute ID', 'Name', 'Email', 'Role', 'Admin Access', 'Remove'];
		headers.forEach(h => {
			const th = document.createElement('th');
			th.textContent = h;
			th.classList.add('ddrow-header');
			tr.appendChild(th);
		})

		table.appendChild(tr);

		data.forEach((m, index) => {
			const tr = document.createElement('tr');

			Object.keys(m).forEach(key => {
				if (key == 'special_permission') {
					const td = document.createElement('td');
					const input = document.createElement('input');
					input.type = 'checkbox';
					input.checked = m[key];
					input.addEventListener('change', async () => {
						if (input.checked == true) {
							if(window.confirm(`Are you sure you want to give ${m.name} admin access? This will allow them to give anybody admin access to the app. This access includes the ability to create, modify, and permanently delete data.`)) {
								await fetch(`/api/update/users/${m.id}`, {
									method: 'PATCH',
									headers: { 'content-type': 'application/json' },
									body: JSON.stringify({ special_permission: true })
								})
								.then(res => {
									if(!res.ok) {
										throw new Error('There was a problem.')
									}
									return res.json();
								})
								.catch(error => console.error('Error:', error));
							} else {
								input.checked = false;
							};
						} else {
							await fetch(`/api/update/users/${m.id}`, {
								method: 'PATCH',
								headers: { 'content-type': 'application/json' },
								body: JSON.stringify({ special_permission: false })
							})
							.then(res => {
								if(!res.ok) {
									throw new Error('There was a problem.')
								}
								return res.json();
							})
							.catch(error => console.error('Error:', error));
						}
					});
					td.appendChild(input);
					tr.appendChild(td);
				} else {
					const td = document.createElement('td');
					td.classList.add('dropdown-col');
					td.textContent = m[key];
					if (key != 'id') {
						attachInlineEdit(td, m, key)
						td.classList.add('editable');
					}
					tr.appendChild(td);
				}
			});

			const td = document.createElement('td');
			const deleteButton = document.createElement('button');
			deleteButton.classList.add('delete-x');
			deleteButton.textContent = '×';
			deleteButton.addEventListener('click',async  () => {
				if(window.confirm(`Are you sure you want to remove ${m.name} from the institute team? They will loose all access to the application.`)) {
					await fetch(`/api/update/users/${m.id}`, {
						method: 'PATCH',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({ role: 'user' })
					})
					.then(res => {
						if(!res.ok) {
							throw new Error('There was a problem.')
						}
						tr.remove();
						return res.json();
					})
					.catch(error => console.error('Error:', error));
				}
			});
			td.appendChild(deleteButton);
			tr.appendChild(td);

			table.appendChild(tr);
		});

		teamRow.dd.appendChild(table);
		DOM.main.appendChild(teamRow.row);
	}

	function renderUserList(data) {
		const userRow = new Row();
		userRow.addTitle('Accounts');
		userRow.addDDMenu();

		const blurb = document.createElement('div');
		blurb.innerHTML = `The accounts on this list do not have access to the application. Accounts can be granted access and added to the institute team by checking the checkbox in the 'Access' column.`;
		blurb.classList.add('blurb');
		userRow.dd.appendChild(blurb);

		const table = document.createElement('table');
		const tr = document.createElement('tr');
		const headers = ['User ID', 'Name', 'Email', 'Access', 'Delete'];
		headers.forEach(h => {
			const th = document.createElement('th');
			th.textContent = h;
			th.classList.add('ddrow-header');
			tr.appendChild(th);
		});

		table.appendChild(tr);

		if (data.length == 0) {
			const tr = document.createElement('tr');
			tr.innerHTML = `<i>There are currently no records to display here</i>`;
			table.appendChild(tr);
		} else {
			data.forEach((u, index) => {
				const tr = document.createElement('tr');

				Object.keys(u).forEach(key => {
					const td = document.createElement('td');

					if (key == 'access') {
						const input = document.createElement('input');
						input.type = 'checkbox';
						input.checked = u.access === true;
						input.addEventListener('change', async () => {
							if (input.checked == true) {
								if(window.confirm(`Are you sure you want to give ${u.name} access? This will allow them to create, modify, and permanently delete data.`)) {
									await fetch(`/api/update/users/${u.id}`, {
										method: 'PATCH',
										headers: { 'content-type': 'application/json' },
										body: JSON.stringify({ role: 'admin' })
									})
									.then(res => {
										if(!res.ok) {
											throw new Error('There was a problem.')
										}
										return res.json();
									})
									.catch(error => console.error('Error:', error));
								} else {
									input.checked = false;
								};
							} else {
								await fetch(`/api/update/users/${u.id}`, {
									method: 'PATCH',
									headers: { 'content-type': 'application/json' },
									body: JSON.stringify({ role: 'user' })
								})
								.then(res => {
									if(!res.ok) {
										throw new Error('There was a problem.')
									}
									return res.json();
								})
								.catch(error => console.error('Error:', error));
							}
						});
						td.appendChild(input);
					} else {
						td.textContent = u[key];
						if (key != 'id') {
							attachInlineEdit(td, u, key);
							td.classList.add('editable');
						}
					}
					tr.appendChild(td);
				});

				const td = document.createElement('td');
				const deleteButton = document.createElement('button');
				deleteButton.classList.add('delete-x');
				deleteButton.textContent = '×';
				deleteButton.addEventListener('click',async  () => {
					if(window.confirm(`Are you sure you want to delete ${u.name} from the database?`)) {
						await fetch(`/admin/api/deleteUser/${u.id}`, {
							method: 'DELETE',
							headers: { 'content-type': 'application/json' }
						})
						.then(res => {
							if(!res.ok) {
								throw new Error('There was a problem.')
							}
							tr.remove();
							return res.json();
						})
						.catch(error => console.error('Error:', error));
					}
				});
				td.appendChild(deleteButton);
				tr.appendChild(td);

				table.appendChild(tr);
			});
		}

		userRow.dd.appendChild(table);
		DOM.main.appendChild(userRow.row);
	}

	function renderEmailFunctions(activeCons, emails) {
		const emailRow = new Row();
		emailRow.addTitle('Emailing');
		emailRow.addDDMenu();
		
		const emailGrid = document.createElement('div');
		emailGrid.classList.add('email-grid');

		const headers = ['Email', 'Convention', 'Date-Time', 'Arm', 'Status'];
		headers.forEach(h => {
			const div = document.createElement('div');
			div.textContent = h;
			div.style.fontWeight = 'bold';
			emailGrid.appendChild(div);
		});

		emailRow.dd.appendChild(emailGrid);

		const reviewEmails = emails.find(e => e.id == 1);
		renderReviewEmailing(emailGrid, activeCons, reviewEmails);

		const year = document.createElement('select');
		activeCons.forEach(c => {
			const option = document.createElement('option');
			option.value = c.convention_id;
			option.textContent = c.location;
			year.appendChild(option);
		});

		DOM.main.appendChild(emailRow.row);
	}

	async function renderReviewEmailing(emailGrid, activeCons, reviewEmails) {
		
		//create grid els
		//title - col 1
		const title = document.createElement('div');
		title.textContent = "Reviews";

		//convention select - col 2
		const year = document.createElement('select');
		activeCons.forEach(c => {
			const option = document.createElement('option');
			option.value = c.convention_id;
			option.textContent = c.location;
			if (reviewEmails.convention_id == c.convention_id) {
				option.selected = true;
			}
			year.appendChild(option);
		});

		//date/time schedule - col 3
		const date = document.createElement('input');
		date.type = 'datetime-local';
		if (reviewEmails.scheduled) {
			const d = new Date(reviewEmails.scheduled);
			date.value = d.toISOString().slice(0, 16);
		};

		if (reviewEmails.status == 'sent') {
			date.disabled = true;
		}

		//checkbox to activate scheduled email - col 4
		const checkLabel = document.createElement('label');
		const check = document.createElement('input');
		check.type = 'checkbox';
		check.checked = reviewEmails.armed;
		checkLabel.appendChild(check);
		if (reviewEmails.status == 'sent') {
			check.disabled = true;
			check.checked = false;
			blurb.innerHTML = `This email has already been sent for this convention. To prevent duplicate emails, the option to activate this email has been disabled. Please pick a different convention.`
		}

		//status - col 4
		const status = document.createElement('div');
		status.innerHTML = `${reviewEmails.status}`

		//info blurb - full row
		const blurb = document.createElement('div');
		blurb.classList.add('blurb');
		blurb.style.gridColumn = 'span 5';

		//separator
		const sep = document.createElement('div');
		sep.classList.add('separator');
		sep.style.gridColumn = 'span 5';

		//add event listeners
		year.addEventListener('change', async (e) => {
		    check.checked = false;
		    blurb.innerHTML = '';

		    try {
		        const res = await fetch(`/api/update/emailing/${reviewEmails.id}`, {
		            method: 'PATCH',
		            headers: {
		                'content-type': 'application/json'
		            },
		            body: JSON.stringify({
		                convention_id: e.target.value,
		                armed: false
		            })
		        });

		        if (!res.ok) {
		            throw new Error('There was a problem.');
		        }

		        const { emails } = await DataAPI.load();
		        const updated = emails.find(email => email.id == reviewEmails.id);

		        status.innerHTML = updated.status;

		        if (updated.status == 'sent') {
		        	check.disabled = true;
		        	blurb.innerHTML = `This email has already been sent for this convention. To prevent duplicate emails, the option to activate this email has been disabled. Please pick a different convention.`
		        } else {
		        	check.disabled = false;
		        }

		    } catch (error) {
		        console.error('Error:', error);
		    }
		});

		date.addEventListener('change', async (e) => {
			check.checked = false;
			blurb.innerHTML = ``;

			await fetch(`/api/update/emailing/${reviewEmails.id}`, {
				method: 'PATCH',
				headers: { 'content-type': 'application/json' },
				body: JSON.stringify({ scheduled: e.target.value, armed: false })
			})
			.then(res => {
				if(!res.ok) {
					throw new Error('There was a problem.')
				}
				return res.json();
			})
			.catch(error => console.error('Error:', error));
		});

		check.addEventListener('change', async (e) => {
			await fetch(`/api/update/emailing/${reviewEmails.id}`, {
				method: 'PATCH',
				headers: { 'content-type': 'application/json' },
				body: JSON.stringify({ armed: e.target.checked })
			})
			.then(res => {
				if(!res.ok) {
					throw new Error('There was a problem.')
				}

				if (e.target.checked) {
					blurb.innerHTML = populateReviewBlurb(activeCons, date, year);
				} else {
					blurb.innerHTML = ``;
				}
				return res.json();
			})
			.catch(error => console.error('Error:', error));
		});

		//populate blurb
		if (reviewEmails.armed) {
			blurb.innerHTML = populateReviewBlurb(activeCons, date, year)
		}

		//append els to grid
		emailGrid.append(title, year, date, checkLabel, status, blurb, sep);
	}

	function populateReviewBlurb(activeCons, date, year) {
		const emailCount = activeCons.find(c => c.convention_id == year.value).email_count;
		const scheduledDate = new Intl.DateTimeFormat('en-US', {
			weekday: 'long',
			year: 'numeric',
			month: 'long',
			day: 'numeric',
			hour: 'numeric',
			minute: '2-digit',
			hour12: true,
			timeZoneName: 'short'
		}).format(new Date(date.value));

		return `On ${scheduledDate}, emails will be sent to ${emailCount} instructors with instructions on how to view class reviews for their classes.`
	}

	function attachInlineEdit(el, entry, key) {
	    el.addEventListener('click', () => {
	    	if (el.querySelector('input.inline-edit')) return;
	      	const oldText = el.textContent;
	      	const input = document.createElement('input');
	      	input.type = 'text';
	      	input.value = oldText;
	      	input.classList.add('inline-edit');
	      	el.textContent = '';
	      	el.appendChild(input);
	      	input.focus();

	      	const save = async () => {
	        	const newText = input.value.trim();
	        	if (newText === oldText || !newText) return (el.textContent = oldText);
	        	try {
	          		const res = await fetch(`/api/update/users/${entry.id}`, {
	            	method: 'PATCH',
	            	headers: { 'Content-Type': 'application/json' },
	            	body: JSON.stringify({ [key]: newText })
	          	});
	          	if (!res.ok) throw new Error('Update failed');
	          	el.textContent = newText;
		        } catch (err) {
		          	console.error(`Failed to update ${key}:`, err);
		          	el.textContent = oldText;
		        }
	  		};

	      	input.addEventListener('blur', save);
	      	input.addEventListener('keydown', e => {
		        if (e.key === 'Enter') input.blur();
		        if (e.key === 'Escape') el.textContent = oldText;
	      	});
	    });
	}
	
</script>
</html>
