<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="public/styles/nav-styles.css">
	<link rel="stylesheet" href="public/styles/themes.css">
	<link rel="stylesheet" href="public/styles/styles.css">
	<link rel="stylesheet" href="public/styles/dd-row.css">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
	<title>Admin Portal</title>
</head>
<body>
	<div id="navbar"></div>
	<header class="clearfix">
		<h1>Admin Tools</h1>
	</header>
	<div class="main-content">
		<div class="dropdown-row">Institute Team Members</div>
		<div class="dropdown-row-info" id="institute-team">
			<div class="ddrow-header">Institute ID</div>
			<div class="vertical-separator"></div>
			<div class="ddrow-header">Name</div>
			<div class="vertical-separator"></div>
			<div class="ddrow-header">Roll</div>
			<div class="vertical-separator"></div>
		</div>
	</div>
</body>
<script src="public/js/script.js"></script>
<script>
	document.addEventListener('DOMContentLoaded', async () => {
		const { instTeam } = await DataAPI.load();
		renderInstTeam(instTeam);
	});

	async function fetchJSON(url, options = {}) {
		const res = await fetch(url, options);
		if (!res.ok) throw new Error(await res.text());
		return res.json();
	}

	const DataAPI = {
		load: async () => {
			const [ instTeam ] = await Promise.all([
				fetchJSON(`/api/read/institute_team`)
			]);

			return { instTeam };
		}
	}

	function renderInstTeam(data) {
		const iTeam = document.getElementById('institute-team');

		data.forEach((m, index) => {
			Object.keys(m).forEach(key => {
				const c = document.createElement('div');
				c.classList.add('dropdown-col');
				c.textContent = m[key];
				iTeam.appendChild(c);

				const sep = document.createElement('div');
				sep.classList.add('vertical-separator');
				iTeam.appendChild(sep);
			});
		});
	}
	
</script>
</html>
