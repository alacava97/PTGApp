<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="public/styles/nav-styles.css">
	<link rel="stylesheet" href="public/styles/themes.css">
	<link rel="stylesheet" href="public/styles/styles.css">
	<link rel="stylesheet" href="public/styles/dd-row.css">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
	<title>Admin Portal</title>
</head>
<body>
	<div id="navbar"></div>
	<header class="clearfix">
		<h1>Admin Tools</h1>
	</header>
	<div class="main-content">
		<div class="dropdown-row">Institute Team Members</div>
		<table class="dropdown-row-info" id="institute-team">
			<tbody id="i-team-tbody">
				<tr>
					<th class="ddrow-header">Institute ID</th>
					<th class="ddrow-header">Name</th>
					<th class="ddrow-header">Role</th>
				</tr>
			</tbody>
		</table>
	</div>
</body>
<script src="public/js/script.js"></script>
<script>
	document.addEventListener('DOMContentLoaded', async () => {
		const res = await fetch('/auth/session', { credentials: 'include' });
		const user = await res.json();
		console.log(user);

		const { instTeam } = await DataAPI.load();
		renderInstTeam(instTeam);

		const adminRes = await fetch('/admin/getUsers', { credentials: 'include' });
		console.log(await adminRes.json())

	});

	async function fetchJSON(url, options = {}) {
		const res = await fetch(url, options);
		if (!res.ok) throw new Error(await res.text());
		return res.json();
	}

	const DataAPI = {
		load: async () => {
			const [ instTeam ] = await Promise.all([
				fetchJSON(`/api/read/institute_team`)
			]);

			return { instTeam };
		}
	}

	function renderInstTeam(data) {
		const iTeam = document.getElementById('i-team-tbody');

		data.forEach((m, index) => {
			const tr = document.createElement('tr');

			Object.keys(m).forEach(key => {
				const td = document.createElement('td');
				td.classList.add('dropdown-col');
				td.textContent = m[key];
				tr.appendChild(td);
			});

			iTeam.appendChild(tr);
		});
	}
	
</script>
</html>
