<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="/public/styles/nav-styles.css">
	<link rel="stylesheet" href="/public/styles/themes.css">
	<link rel="stylesheet" href="/public/styles/styles.css">
	<link rel="stylesheet" href="/public/styles/dd-row.css">
	<link rel="stylesheet" href="/public/styles/row.css">
	<link rel="stylesheet" href="/public/styles/sort-list.css">
	<link rel="stylesheet" href="/public/styles/admin.css">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
	<title>Admin Portal</title>
</head>
<body>
	<header>
		<h1>Emailing</h1>
		<div id="navbar"></div>
	</header>
	<div class="option-bar">
		<input id="searchbar" class="searchbar" type="text" name="searchbar" placeholder="Search by recipient, copy, convention, status, etc.">
		<div id="new-btn" class="new-btn">new</div>
	</div>


	<div id="main-content" class="main-content">
		<div id="count"></div>
		<form id="new-email-form" class="email-grid">
			<label for="convention">Convention<br>
				<select id="convention" name="convention_id"></select>
			</label>
			

			<label for="copy">Copy<br>
				<select id="copy" name="copy_id" required>
					<option value="" selected disabled>Select a Copy</option>
				</select>
			</label>
			

			<label for="address">To<br>
				<select id="address" name="address" required>
					<option value="" selected disabled>Select a Group</option>
					<option value="1">All instructors</option>
					<option value="2">Only instructors teaching at this convention</option>
					<option value="3">Test</option>
				</select>
			</label>
			

			<label for="sendAt">Send At<br>
				<input type="datetime-local" id="sendAt" name="send_at" required>
			</label>
			

			<button type="submit">Schedule Send</button>
			<div class="col5">View selected copy <i class="fa fa-caret-down"></i><div id="view-copy"></div></div>
			<div class="col5">View selected group <i class="fa fa-caret-down"></i><div id="view-group"></div></div>
		</form>
	</div>
</body>
<script src="/public/js/script.js"></script>
<script src="/public/js/UI.js"></script>
<script>
	const DOM = {
		main: document.getElementById('main-content'),
		newEmailForm: document.getElementById('new-email-form'),
		conSelect: document.getElementById('convention'),
		copySelect: document.getElementById('copy'),
		groupSelect: document.getElementById('address'),
		newBtn: document.getElementById('new-btn'),
		count: document.getElementById('count')
	}

	const copyObj = {
		1: 'Class Reviews'
	};

	document.addEventListener('DOMContentLoaded', init);

	async function init() {
	    await requireAdmin();

	    const { emails, conventions, mailInfo } = await DataAPI.load();

	    renderNewEmailForm(conventions, mailInfo.copies.copy, mailInfo.emails);
	    renderBulk(emails.bulk);
	    displayRecords(emails.emails);

	    searchBar(emails.emails);
	    DOM.count.innerHTML = `Found ${emails.emails.length} records.`

	}

	//-----Auth-----//
	async function requireAdmin() {
		const res = await fetch('/auth/session', {
			credentials: 'include'
		});

		const user = await res.json();
		
		if (!user.special_permission) {
			window.location.replace('/public/oops.html');
		}
	}

	//-----Data-----//

	const DataAPI = {
		load: async () => {
			const [ emails, conventions, mailInfo ] = await Promise.all([
				fetchJSON(`/admin/api/getEmails`),
				fetchJSON(`/api/public/getConventions`),
				fetchJSON(`/api/email/getMailInfo`)
			]);

			return { emails, conventions, mailInfo };
		},

		group: async (conId) => {
			const group = await fetchJSON(`/admin/api/getEmailAddressesByConvention/${conId}`);
			return group;
		},

		emails: async() => {
			const emails = await fetchJSON(`/admin/api/getEmails`);
			return emails;
		}
	}

	async function cancelEmail(id, tr) {
		await fetch(`/admin/api/cancelSend/${id}`, {
			method: 'DELETE',
			headers: { 'content-type': 'application/json' },
		})
		.then(res => {
			if(!res.ok) {
				throw new Error('There was a problem.')
			}
			tr.remove();
			return res.json();
		})
		.catch(error => console.error('Error:', error));
	}

	async function cancelBulk(id, tr) {
		await fetch(`/admin/api/cancelBulkSend/${id}`, {
			method: 'DELETE',
			headers: { 'content-type': 'application/json' },
		})
		.then(async res => {
			if(!res.ok) {
				throw new Error('There was a problem.')
			}
			tr.remove();
			const emails = await DataAPI.emails();
			displayRecords(emails.emails);
			return res.json();
		})
		.catch(error => console.error('Error:', error));
	}

	//-----Render-----//
	function displayRecords(data) {
		let tableContainer

		if(document.getElementById('email-table-container')) {
			tableContainer = document.getElementById('email-table-container');
			tableContainer.innerHTML = '';
		} else {
			tableContainer = document.createElement('div');
			tableContainer.classList.add('table-container');
			tableContainer.id = 'email-table-container';
		}

		const title = document.createElement('h3');
		title.textContent = 'Scheduled Individual Emails';
		tableContainer.appendChild(title);
			
		const table = document.createElement('table');

		const headers = ['ID', 'Address', 'Copy', 'Bulk ID', 'Send At', 'Status', 'Cancel'];

		table.appendChild(renderHeaders(headers));
		data.forEach(e => {
			table.appendChild(renderEmailRows(e))
		});

		tableContainer.appendChild(table);
		DOM.main.appendChild(tableContainer);
	}

	function renderHeaders(headers) {
		const headerRow = document.createElement('tr');
		headers.forEach(h => {
			const th = document.createElement('th');
			th.textContent = h;
			headerRow.appendChild(th);
		});
		
		return headerRow;
	}

	function renderEmailRows(e) {
		const tr = document.createElement('tr');

		Object.keys(e).forEach(key => {
			const td = document.createElement('td');
			if (key == 'send_at' || key == 'created_at') {
				const options = {
					weekday: 'long',
					year: 'numeric',
					month: 'long',
					day: 'numeric',
					hour12: true,
					hour: 'numeric',
					minute: 'numeric'
				}
				td.textContent = new Intl.DateTimeFormat("en-us", options).format(new Date(e[key]))
			} else if (key == 'copy_id') {
				td.textContent = copyObj[e[key]];
			} else {
				td.textContent = e[key];
				if (key == 'status' || key == 'job_status') {
					if (e[key] == 'sent' || e[key] == 'completed') {
						td.classList.add('sent-email');
					} else if (e[key] == 'pending') {
						td.classList.add('pending-email')
					}
				}
			}
		
			tr.appendChild(td);
		});

		const td = document.createElement('td');

		if (e.status == 'pending') {
			td.appendChild(renderDeleteButton(e, tr, 'single'));
		} else if (e.job_status == 'pending') {
			td.appendChild(renderDeleteButton(e, tr, 'bulk'))
		}
		
		tr.appendChild(td);

		return tr;
	}

	function renderDeleteButton(e, tr, q) {
		const deleteButton = document.createElement('button');
		deleteButton.classList.add('delete-x');
		deleteButton.textContent = '×';
		deleteButton.addEventListener('click',async  () => {
			if (q == 'single') {
				if (confirm(`Cancel email to ${e.address}?`)) {
					await cancelEmail(e.id, tr)
				}
			} else if (q == 'bulk') {
				if (confirm('Cancel bulk send?')) {
					await cancelBulk(e.id, tr)
				}
			}
		});
		
		return deleteButton;
	}

	function renderBulk(data) {
		let tableContainer

		if(document.getElementById('bulk-table-container')) {
			tableContainer = document.getElementById('bulk-table-container');
			tableContainer.innerHTML = '';
		} else {
			tableContainer = document.createElement('div');
			tableContainer.classList.add('table-container');
			tableContainer.id = 'bulk-table-container';
		}


		const title = document.createElement('h3');
		title.textContent = 'Scheduled Bulk Emails';
		tableContainer.appendChild(title);

		const table = document.createElement('table');

		const headers = ['Bulk ID', 'Convention', 'Copy', 'Created At', 'Send At', 'Job Status', 'Cancel'];

		table.appendChild(renderHeaders(headers));
		data.forEach(e => {
			table.appendChild(renderEmailRows(e))
		});

		tableContainer.appendChild(table);
		DOM.main.appendChild(tableContainer);
	}

	//-----Forms-----//
	function renderNewEmailForm(conventions, copies, groups) {
		//render convention select
		conventions.forEach(c => {
			const option = document.createElement('option');
			option.value = c.id;
			option.innerHTML = `${c.year} - ${c.city_state}`
			DOM.conSelect.appendChild(option);
		});

		//render copy select
		Object.keys(copyObj).forEach(key => {
			const option = document.createElement('option');
			option.value = key;
			option.textContent = copyObj[key];
			DOM.copySelect.appendChild(option);
		});

		//initialize 'new' button
		DOM.newEmailForm.style.display = 'none';
		DOM.newBtn.addEventListener('click', (e) => {
			e.stopPropagation();
			DOM.newEmailForm.style.display = 
				DOM.newEmailForm.style.display === 'grid' ? 'none' : 'grid';
		});

		DOM.newEmailForm.addEventListener('click', (e) => {
			e.stopPropagation();
		})

		document.addEventListener('click', (e) => {
			if (e.target != DOM.newEmailForm) {
				DOM.newEmailForm.style.display = 'none';
			}
		});

		//initialize 'view copy' dropdown
		const viewCopy = document.getElementById('view-copy');
		const viewCopyContainer = viewCopy.parentElement;
		viewCopyContainer.addEventListener('click', () => {
			if (viewCopy.style.display === 'block') {
				viewCopy.style.display = 'none';
			} else {
				renderCopy(viewCopy, copies);
			}
		});

		DOM.copySelect.addEventListener('change', () => {
			if (viewCopy.style.display === 'block') {
				renderCopy(viewCopy, copies);
			}
		});

		//initialize 'view group' dropdown
		const viewGroup = document.getElementById('view-group');
		const viewGroupContainer = viewGroup.parentElement;
		viewGroupContainer.addEventListener('click', async () => {
			if (viewGroup.style.display === 'block') {
				viewGroup.style.display = 'none';
			} else {
				viewGroup.style.display = 'block';
				await renderEmailGroup(viewGroup, groups)
			}
		});

		DOM.groupSelect.addEventListener('change', async () => {
			if (viewGroup.style.display === 'block') {
				await renderEmailGroup(viewGroup, groups)
			}
		});

		DOM.conSelect.addEventListener('change', async () => {
			if (viewGroup.style.display === 'block') {
				await renderEmailGroup(viewGroup, groups)
			}
		});

		//handle submit
		DOM.newEmailForm.addEventListener('submit', emailFormSubmit)
	}

	async function emailFormSubmit(e) {
		e.preventDefault();
		const formData = Object.fromEntries(new FormData(e.target));
		let group;

		if(formData.convention_id && formData.address == 2) {
			group = await DataAPI.group(formData.convention_id);
		} else if (formData.address == 1) {
			group = await fetchJSON('/api/email/getMailInfo');
		} else if (formData.address == 3) {
			group = ['alacava97@gmail.com', 'lacavapiano@gmail.com'];
		}

		if (!checkDuplicateEmail(await fetchJSON('/admin/api/getEmails'), formData)) {

			try {
				const data = { formData, group };

				const response = await fetch('/admin/api/scheduleBulkSend', {
					method: 'POST',
					headers: {
						'content-type': 'application/json',
					},
					body: JSON.stringify(data)
				});

				if (!response.ok) {
					throw new Error(`There was a problem scheduling emails: ${response.status}`);
				}

				const res = await response.json();

				return res;
			} catch (error) {
				console.error('Error scheduling emails:', error);
			} finally {
				DOM.newEmailForm.reset();
				DOM.newEmailForm.style.display = 'none';
				const emails = await fetchJSON('/admin/api/getEmails');

				await renderBulk(emails.bulk);
				await displayRecords(emails.emails);
			}
		} else {
			alert('This copy has already been sent to this group. Duplicate emails are not permitted');
		}
	}

	function renderCopy(viewCopy, copies) {
		viewCopy.style.display = 'block';
		
		const selectedCopy = copies[DOM.copySelect.value];
		if(selectedCopy){
			viewCopy.textContent = selectedCopy;
		} else {
			viewCopy.textContent = 'No copy selected'
		}
	}

	async function renderEmailGroup(viewGroup, groups) {
		viewGroup.innerHTML = '';
		if(!DOM.groupSelect.value) {
			viewGroup.innerHTML = 'No group selected';
		} else if (DOM.groupSelect.value == 1) {
			const { table, count } = renderGroupTable(groups)
			viewGroup.append(count, table);
		} else if (DOM.groupSelect.value == 2) {
			const selectedConvention = DOM.conSelect.value
			if (!selectedConvention) {
				viewGroup.textContent = 'No convention selected';
			} else {
				const addresses = await DataAPI.group(selectedConvention);
				const { table, count } = renderGroupTable(addresses);
				viewGroup.append(count, table);
			}
		}
	}

	function renderGroupTable(data) {
		const table = document.createElement('table');

		const headers = ['Instructor ID', 'Email Address', 'Name'];
		const headerRow = document.createElement('tr');
		headers.forEach(h => {
			const th = document.createElement('th');
			th.textContent = h;
			headerRow.appendChild(th);
		});
		table.appendChild(headerRow);

		data.forEach(e => {
			const tr = document.createElement('tr');
			Object.keys(e).forEach(key => {
				const td = document.createElement('td');
				td.textContent = e[key];
				tr.appendChild(td);
			});
			table.appendChild(tr);
		});

		const count = document.createElement('div');
		count.textContent = `Displaying ${data.length} records.`;
		count.classList.add('group-count');

		return { table, count };
	}

	//HELPERS

	function checkDuplicateEmail(emails, formData) {
		const duplicate = emails.conflicts.find(b => b.copy_id == formData.copy_id && b.convention_id == formData.convention_id);
		if (duplicate) {
			return true
		} else {
			return false
		}
	}
</script>
</html>
