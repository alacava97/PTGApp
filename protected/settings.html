<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="public/styles/styles.css">
	<link rel="stylesheet" href="public/styles/buttons.css">
	<link rel="stylesheet" href="public/styles/themes.css">
	<link rel="stylesheet" href="public/styles/modals.css">
	<link rel="stylesheet" href="public/styles/nav-styles.css">
	<link rel="stylesheet" href="public/styles/sort-list.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
	<title>PTG Convention Web App</title>
</head>
<body>
	<header>
		<h1>Settings</h1>
		<div id="navbar"></div>
	</header>
	<div class="flex-row-2">
		<div>
			<h2>Class Types</h2>
			<ul id="class-type-list" class="transparent type-ul"></ul>
		</div>
		<div>
			<h2>Sponsors</h2>
			<ul id="sponsor-list" class="transparent type-ul"></ul>
		</div>
	</div>
</body>
<script src="public/js/script.js"></script>
<script src="public/js/sort-list.js"></script>
<script>
	document.addEventListener('DOMContentLoaded', async () => {
		const { types, sponsors } = await DataAPI.load();
		const typeList = document.getElementById('class-type-list');
		const typeListObj = setupSortList(types, 'type', 'types', document.getElementById('add-type'))
		typeList.appendChild(typeListObj.list);
		typeList.appendChild(typeListObj.addBtn);

		const sponsorList = document.getElementById('sponsor-list');
		const sponsorListObj = setupSortList(sponsors, 'sponsor_name', 'sponsors', document.getElementById('add-sponsor'))
		sponsorList.appendChild(sponsorListObj.list);
		sponsorList.appendChild(sponsorListObj.addBtn);
	});

	const DataAPI = {
		load: async () => {
			const [ types, sponsors ] = await Promise.all([
				fetchJSON(`/api/read/types`),
				fetchJSON(`/api/read/sponsors`)
			]);

			return { types, sponsors };
		}
	}

</script>
