<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="public/styles/styles.css">
	<link rel="stylesheet" href="public/styles/buttons.css">
	<link rel="stylesheet" href="public/styles/themes.css">
	<link rel="stylesheet" href="public/styles/modals.css">
	<link rel="stylesheet" href="public/styles/nav-styles.css">
	<link rel="stylesheet" href="public/styles/row.css">
	<link rel="stylesheet" href="public/styles/conventions.css">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
	<title>Conventions</title>
</head>
<body>
	<header class="clearfix">
		<h1>Conventions</h1>
		<div id="navbar"></div>
	</header>
	<div class="option-bar">
		<input id="searchbar" class="searchbar" type="text" name="searchbar" placeholder="Search by year or location">
		<div id="new-btn" class="new-btn">new</div>
	</div>
	<div id="list"></div>
</body>
<script src="public/js/script.js"></script>
<script src="public/js/modals.js"></script>
<script src="public/js/UI.js"></script>
<script src="public/js/qr.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
<script>
	document.addEventListener('DOMContentLoaded', async () => {
		const { conventions } = await DataAPI.load();
		await displayRecords(conventions)

		searchBar(conventions);

		const newConvention = new Modal('newModal');
		newConvention.content(`<h2>New Convention</h2>
			<form id="new-convention-form">
				<label for="year">Year</label>
				<input id="year" type="number" name="year" placeholder="year" autocomplete="off" required>
				<div class="seperator"></div>

				<label for="dates">Start Date</label>
				<input id="startDate" type="date" name="start_date">

				<label for="endDate">End Date</label>
				<input id="endDate" type="date" name="end_date">
				<div class="seperator"></div>

				<label for="conventionDropdown">Type</label>
				<Select id="conventionDropdown" name="location_id" required>
					<option value="" selected disabled>Select a convention hall</option>
				</Select>
				<div class="seperator"></div>

				<button type="submit" class="button">Create Record</button>
			</form>

			<div id="message"></div>`);
		document.getElementById('new-btn').addEventListener('click', () => newConvention.show());

		const startInput = document.getElementById('startDate');
		const endInput = document.getElementById('endDate');

		startInput.addEventListener('change', (e) => {
		    endInput.min = e.target.value;
		});

		endInput.addEventListener('change', (e) => {
		    startInput.max = e.target.value;
		});
	
		async function conSuccess() {
			const { conventions } = await DataAPI.load();
			await displayRecords(conventions);
		}
		newConvention.formSubmit(conSuccess, 'conventions', type = 'create');

		const conventionHallSelect = document.getElementById('conventionDropdown');
		await populateDropdown(conventionHallSelect, 'locations', 'location_name');
	});

	async function fetchJSON(url, options = {}) {
		const res = await fetch(url, options);
		if (!res.ok) throw new Error(await res.text());
		return res.json();
	}

	const DataAPI = {
		load: async () => {
			const [ conventions ] = await Promise.all([
				fetchJSON(`/api/read/conventions`)
			]);

			return { conventions };
		}
	}

	async function displayRecords(data) {
		const list = document.getElementById('list');
		list.innerHTML = '';

		console.log(data);

		Object.entries(data).forEach(async record => {
			//create entry row
			record = record[1];
			const entry = new Row();
			await renderEntry(record, entry);

			list.appendChild(entry.row);
		})
	}

	async function renderEntry(record, entry) {
		const name = `${record.year} - ${record.city_state}`
		const subtitle = `${record.location_name}`;

		entry.addTitle(name);
		entry.addSubtitle(subtitle);

		const conStatusButton = document.createElement('button');
		conStatusButton.style.color = 'white';

		if (record.closed == true) {
			entry.addStatus('closed');
			entry.status.style.backgroundColor = "#2196f3"
			conStatusButton.textContent = 'Open Convention';
			conStatusButton.style.backgroundColor = '#04aa0a';
		} else {
			entry.addStatus('open');
			entry.status.style.backgroundColor = "#04aa0a"
			conStatusButton.textContent = 'Close Convention';
			conStatusButton.style.backgroundColor = '#2196f3';
		}

		//render dropdown menu
		entry.addDDMenu();

		//render update form
		const startDate = record.start_date;
		const endDate = record.end_date;

		const updateForm = document.createElement('form');
		updateForm.innerHTML = `
			<div style="grid-column:span 2;text-align:center;"><b>Convention Info</b></div>
			<label for="year-${record.id}">Year</label>	
			<input id="year-${record.id}" name="year" type="number" value="${record.year}">
			
			<label for="start-date-${record.id}">Start Date</label>
			<input id="start-date-${record.id}" name="start_date" type="date" value="${startDate ? startDate.split('T')[0] : ''}">
			
			<label for="end-date-${record.id}">End Date</label>
			<input id="end-date-${record.id}" name="end_date" type="date" value="${endDate ? endDate.split('T')[0] : ''}">
			
			<label for="location-${record.id}">Location</label>	
			<select id="location-${record.id}" name="location_id">
				<option value="" disabled>Select a convention hall</option>
			</select>
			
			<button type="submit">Update</button>
			<div id="message-${record.id}" style="text-align:center;width:100%;grid-column:span 2;"></div>
		`

		const locationSelect = updateForm.querySelector(`#location-${record.id}`);
		await populateDropdown(locationSelect, 'locations', 'location_name');
		locationSelect.querySelector(`option[value="${record.location_id}"]`).selected = true;

		if (record.closed == true) {
			updateForm.querySelectorAll('input, select, button[type="submit"]').forEach(el => {
				el.disabled = true;
			});
		}

		updateForm.addEventListener('submit', (e) => {
			handleFormSubmission(e, updateForm, `/api/update/conventions/${record.id}`, 'PATCH', async (result) => {
				const updated = await fetchJSON(`/api/readEntry/conventions/${record.id}`);
				const newEntry = new Row();
				await renderEntry(updated, newEntry);
				entry.row.replaceWith(newEntry.row);
				newEntry.row.querySelector('.row-dd').style.display = 'flex';
				alert(result.message);
			});
		});

		entry.dd.appendChild(updateForm);

		//class prop section
		const props = document.createElement('div');
		props.classList.add('props');

		const propTitle = document.createElement('div');
		propTitle.textContent = 'Class Proposals';
		propTitle.style.fontWeight = 'bold';
		props.appendChild(propTitle);

		const closeDateLabel = document.createElement('label');
		closeDateLabel.textContent = 'Class Proposal Deadline';
		closeDateLabel.classList.add('prop-label');

		const closeDate = document.createElement('input');
		closeDate.type = 'date';
		closeDate.valueAsDate = new Date(record.props_closed);
		closeDate.addEventListener('change', async (e) => {
			e.preventDefault();
			fetchJSON(`/api/update/conventions/${record.id}`, {
				method: 'PATCH',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({
					props_closed: e.target.value
				})
			})
		})
		if (record.closed == true) {
			closeDate.disabled = true;
		}
		closeDateLabel.appendChild(closeDate);

		props.appendChild(closeDateLabel);

		const classPropLink = document.createElement('a');
		classPropLink.href = createClassPropLink(record.id);
		classPropLink.innerHTML = `&#x1F517 Class Proposal Form ${record.year}`;
		props.appendChild(classPropLink);

		const qrCode = document.createElement('div');
		generateQRCode(createClassPropLink(record.id), qrCode);
		props.appendChild(qrCode);

		entry.dd.appendChild(props);

		conStatusButton.addEventListener('click', async (e) => {
			e.preventDefault();
			await fetchJSON(`/api/update/conventions/${record.id}`, {
				method: 'PATCH',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({
					closed: !record.closed
				})
			});

			const updated = await fetchJSON(`/api/readEntry/conventions/${record.id}`);
			const newEntry = new Row();
			await renderEntry(updated, newEntry);
			entry.row.replaceWith(newEntry.row);
			newEntry.row.querySelector('.row-dd').style.display = 'flex';
		});
		updateForm.appendChild(conStatusButton);

		const deleteButton = document.createElement('button');
		deleteButton.classList.add('delete-button');
		deleteButton.textContent = 'Delete Convention';
		deleteButton.addEventListener('click', async (e) => {
			e.preventDefault();
			if (window.confirm('Do you want to permanently delete this convention and all related calendars and events?')) {
				try {
					const response = await fetch(`/api/delete/conventions/${record.id}`, {method: 'DELETE'});

					const data = await response.json();

					if (!response.ok) {
						alert(data.error);
						return;
					}

					entry.row.remove();
				} catch (err) {
					console.error(err);
				}
			
			}
		})
		updateForm.appendChild(deleteButton);
	}
	
</script>
</html>
